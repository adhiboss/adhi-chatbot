version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - ask_fees
  - ask_timetable

responses:
  utter_greet:
    - text: "Hi, I am Adhi Bot 🤖 How can I help you?"

  utter_cheer_up:
    - text: "Here is something to cheer you up:"
      image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
    - text: "Did that help you?"

  utter_happy:
    - text: "Great, carry on!"

  utter_goodbye:
    - text: "Bye"

  utter_iamabot:
    - text: "I am Adhi Bot 🤖"

  utter_fees:
    - text: "You can check your fees on the college portal."

  utter_timetable:
    - text: "Your timetable is available in your dashboard."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

assistant_id: adhi_bot
